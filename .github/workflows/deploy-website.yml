name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install and Build
        run: |
          pnpm install
          pnpm -r run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: website/dist
          clean: false
