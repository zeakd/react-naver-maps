name: CI

on:
  pull_request:
    branches: [main]

# 같은 브랜치의 이전 run을 자동 취소 — hang/중복 run 누적 방지
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: pnpm
      # astro-component-docs의 test 스크립트가 bun 사용 (bun test src/)
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      # vitest browser mode가 Playwright Chromium 헤드리스를 사용하므로 설치 필요.
      # --with-deps(sudo apt-get install)는 GitHub 호스티드 ubuntu에서 apt 락으로 hang하고,
      # 호스티드 러너는 chromium 런타임 라이브러리를 대부분 사전 포함하므로 제거한다.
      - run: pnpm --filter react-naver-maps exec playwright install chromium
        timeout-minutes: 10
      - run: pnpm -r run build
      - run: pnpm -r run lint
      - run: pnpm -r run test
