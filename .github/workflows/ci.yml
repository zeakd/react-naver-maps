name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: pnpm
      # astro-component-docs의 test 스크립트가 bun 사용 (bun test src/)
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      # vitest browser mode가 Playwright Chromium 헤드리스를 사용하므로 설치 필요
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm -r run build
      - run: pnpm -r run lint
      - run: pnpm -r run test
